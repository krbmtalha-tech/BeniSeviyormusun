<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Beni seviyor musun?">
    <title>Beni Seviyor Musun? 🥺</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container" id="main-container">
        <div class="gif-container">
            <img src="https://media.tenor.com/VIChDQ6ejRQAAAAj/jumping-bear-kurumi-tokisaki.gif" alt="Sevimli Ayıcık"
                class="main-img" id="main-gif">
        </div>
        <h1 id="question">Beni seviyor musun? 🥺</h1>
        <div class="buttons">
            <button id="btn-yes" class="btn yes">Evet</button>
            <button id="btn-no" class="btn no">Hayır</button>
        </div>
    </div>

    <div class="container hidden" id="success-container">
        <div class="gif-container">
            <img src="https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-kisses.gif" alt="Mutlu Ayıcıklar"
                class="success-img">
        </div>
        <h1>İyi ki varsın yavrummm! ❤️</h1>
    </div>

    <script src="script.js"></script>
</body>

</html>
